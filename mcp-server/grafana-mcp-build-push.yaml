name: Build, Push & Retrieve Grafana MCP Image To/From JFrog

on:
  push:
    branches: [ develop ]
    paths:
      - 'mcp-server/**'
      - '.github/workflows/grafana-mcp-build-push.yaml'
  workflow_dispatch:

jobs:
  build-push-and-save:
    runs-on: sw-ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Dockerfile
        id: locate
        run: |
          DOCKERFILE=$(find mcp-server -name "Dockerfile" -type f | head -1)

          if [ -z "$DOCKERFILE" ]; then
            echo "::error::No Dockerfile found under mcp-server/ — aborting."
            exit 1
          fi

          BUILD_CONTEXT=$(dirname "$DOCKERFILE")

          echo "DOCKERFILE=$DOCKERFILE"       >> $GITHUB_OUTPUT
          echo "BUILD_CONTEXT=$BUILD_CONTEXT" >> $GITHUB_OUTPUT

          echo "Found Dockerfile : $DOCKERFILE"
          echo "Build context    : $BUILD_CONTEXT"

      - name: Log in to JFrog Docker Registry (for push)
        uses: <your-org-actions-repo>/sw-build-deploy-docker-image-composite-action@v1
        with:
          image_registry: ${{ secrets.ARTIFACTORY_REGISTRY }}
          image_registry_username: ${{ secrets.ARTIFACTORY_USERNAME }}
          image_registry_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}

      - name: Parse all image LABELs from Dockerfile
        id: meta
        run: |
          DOCKERFILE="${{ steps.locate.outputs.DOCKERFILE }}"

          IMAGE_NAME=$(grep -m1 'org\.opencontainers\.image\.title' "$DOCKERFILE" \
            | sed 's/.*org\.opencontainers\.image\.title="\([^"]*\)".*/\1/')

          IMAGE_VERSION=$(grep -m1 'org\.opencontainers\.image\.version' "$DOCKERFILE" \
            | sed 's/.*org\.opencontainers\.image\.version="\([^"]*\)".*/\1/')

          if [ -z "$IMAGE_NAME" ]; then
            echo "::error::Dockerfile is missing: LABEL org.opencontainers.image.title=\"<name>\""
            exit 1
          fi

          if [ -z "$IMAGE_VERSION" ]; then
            echo "::error::Dockerfile is missing: LABEL org.opencontainers.image.version=\"<version>\""
            exit 1
          fi

          ALL_LABELS=$(grep '^LABEL' "$DOCKERFILE" | tr -d '\r' | tr '\n' ';')

          echo "IMAGE_NAME=$IMAGE_NAME"       >> $GITHUB_OUTPUT
          echo "IMAGE_VERSION=$IMAGE_VERSION" >> $GITHUB_OUTPUT
          echo "ALL_LABELS=$ALL_LABELS"       >> $GITHUB_OUTPUT

          echo "Parsed IMAGE_NAME    : $IMAGE_NAME"
          echo "Parsed IMAGE_VERSION : $IMAGE_VERSION"

      - name: Build Docker image
        run: |
          docker build \
            -f "${{ steps.locate.outputs.DOCKERFILE }}" \
            -t "${{ steps.meta.outputs.IMAGE_NAME }}:${{ steps.meta.outputs.IMAGE_VERSION }}" \
            "${{ steps.locate.outputs.BUILD_CONTEXT }}"

      - name: Tag, Push for Each Env-Specific Tag, and Write/Update CSV
        env:
          REGISTRY: ${{ secrets.ARTIFACTORY_REGISTRY }}
          REPO: <your-org>/obseng-keystone-infra
        run: |
          IMAGE_NAME="${{ steps.meta.outputs.IMAGE_NAME }}"
          IMAGE_VERSION="${{ steps.meta.outputs.IMAGE_VERSION }}"
          CSV_FILE=images.csv
          LABELS="${{ steps.meta.outputs.ALL_LABELS }}"

          if [ ! -f "$CSV_FILE" ]; then
            echo "Image Name,Tag,Location,Labels" > $CSV_FILE
          fi

          for ENV in dev non-prod prod; do
            REMOTE_REPO="$REGISTRY/$REPO/$IMAGE_NAME/${IMAGE_NAME}_${IMAGE_VERSION}"
            TAG="$ENV"

            docker tag "$IMAGE_NAME:$IMAGE_VERSION" "$REMOTE_REPO:$TAG"
            docker push "$REMOTE_REPO:$TAG"

            if ! grep -q "$IMAGE_NAME,$TAG,$REMOTE_REPO:$TAG" "$CSV_FILE"; then
              echo "$IMAGE_NAME,$TAG,$REMOTE_REPO:$TAG,\"$LABELS\"" >> "$CSV_FILE"
            fi
          done