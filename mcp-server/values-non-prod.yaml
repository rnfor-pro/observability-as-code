# ── Non-prod environment overrides ───────────────────────────────────────────
# These values override values.yaml for the np-keystone namespace.
# Run with:
#   helm upgrade --install grafana-mcp ./mcp-server \
#     --namespace np-keystone \
#     -f mcp-server/ci/values-non-prod.yaml

environment: non-prod

image:
  registry: docker.artifactory.<your-domain>.com
  repository: sherwin-williams-co/obseng-keystone-infra/grafana-mcp/grafana-mcp_0.11.0
  tag: non-prod

grafana:
  url: http://grafana.np-keystone.svc.cluster.local:3000
  forwardHeaders: false
  tokenSecret: grafana-mcp-token

mcp:
  transport: streamable-http
  # non-prod: write enabled so teams can create/update dashboards during testing
  disableWrite: false
  metrics: true

logLevel: info
replicaCount: 2

ingress:
  enabled: true
  className: nginx
  clusterIssuer: vault-issuer
  host: mcp-grafana-np.<your-domain>.com
  tlsSecretName: grafana-mcp-np-tls-secret
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

secret:
  create: false